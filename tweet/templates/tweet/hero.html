{% load static %}

<section class="hero-autumn">

<style>
/* ===== HERO AUTUMN - ENHANCED WITH STEAMING HOT CHAI EFFECT ===== */
.hero-autumn {
    height: 100vh;
    min-height: 650px;
    background: url("{% static 'tweet/images/hero.jpg' %}") no-repeat center center / cover;
    position: relative;
    display: flex;
    align-items: center;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    overflow: hidden;
}

/* Warm overlay */
.hero-autumn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to right,
        rgba(90,50,20,0.82),
        rgba(90,50,20,0.42),
        rgba(90,50,20,0.08)
    );
    z-index: 1;
}

/* Steam container - positioned bottom-center for hot chai feel */
.steam-container {
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 400px;
    pointer-events: none;
    z-index: 2; /* above overlay, below text */
    opacity: 0.85;
}

/* Individual steam wisps */
.steam-wisp {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 60px;
    height: 180px;
    background: linear-gradient(to top, transparent, rgba(255,255,255,0.9), rgba(255,255,255,0.4), transparent);
    border-radius: 50% 50% 0 0;
    filter: blur(12px);
    opacity: 0;
    transform: translateX(-50%) scale(0.6);
    animation: riseSteam linear infinite;
}

/* Multiple wisps with delays & variations */
.steam-wisp:nth-child(1) { animation-delay: 0s; left: 40%; width: 80px; height: 220px; animation-duration: 8s; }
.steam-wisp:nth-child(2) { animation-delay: 1.2s; left: 55%; width: 50px; height: 160px; animation-duration: 10s; filter: blur(15px); }
.steam-wisp:nth-child(3) { animation-delay: 2.8s; left: 48%; width: 70px; height: 200px; animation-duration: 9s; }
.steam-wisp:nth-child(4) { animation-delay: 4.5s; left: 60%; width: 45px; height: 140px; animation-duration: 7s; filter: blur(18px); opacity: 0.7; }

/* Steam rise animation - gentle sway + fade + grow */
@keyframes riseSteam {
    0% {
        transform: translateX(-50%) translateY(0) scale(0.5) rotate(0deg);
        opacity: 0;
    }
    10% { opacity: 0.9; }
    50% {
        transform: translateX(calc(-50% + var(--sway))) translateY(-280px) scale(1.3) rotate(var(--rot));
    }
    100% {
        transform: translateX(calc(-50% + var(--sway2))) translateY(-450px) scale(1.8) rotate(var(--rot2));
        opacity: 0;
    }
}

/* Sway variation using custom props */
.steam-wisp:nth-child(1) { --sway: -20px; --sway2: 15px; --rot: -8deg; --rot2: 6deg; }
.steam-wisp:nth-child(2) { --sway: 18px; --sway2: -25px; --rot: 10deg; --rot2: -7deg; }
.steam-wisp:nth-child(3) { --sway: -12px; --sway2: 20px; --rot: -5deg; --rot2: 9deg; }
.steam-wisp:nth-child(4) { --sway: 22px; --sway2: -15px; --rot: 7deg; --rot2: -4deg; }

/* Content text */
.hero-text {
    position: relative;
    z-index: 3;
    padding-left: 8%;
    max-width: 620px;
    color: #ffffff;
    animation: heroFade 1.3s ease forwards 0.4s;
    opacity: 0;
}

.hero-text.visible {
    opacity: 1;
}

/* Title & others */
.hero-text h1 {
    font-size: clamp(2.6rem, 4.5vw, 4.2rem);
    font-weight: 900;
    line-height: 1.08;
    margin-bottom: 1.2rem;
    letter-spacing: -0.8px;
    text-shadow: 0 8px 22px rgba(0,0,0,.7);
}

.hero-text p {
    font-size: clamp(1rem, 1.4vw, 1.15rem);
    line-height: 1.75;
    max-width: 520px;
    color: #f4efe6;
    margin-bottom: 2.4rem;
}

.hero-btn {
    display: inline-block;
    padding: 14px 44px;
    background: #f2b84b;
    color: #4b260f;
    font-weight: 700;
    font-size: 1.05rem;
    border-radius: 50px;
    text-decoration: none;
    transition: .35s ease;
}

.hero-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 26px rgba(0,0,0,.35);
}

@keyframes heroFade {
    from { opacity: 0; transform: translateX(-50px); }
    to   { opacity: 1; transform: translateX(0); }
}

/* Mobile adjustments */
@media (max-width: 768px) {
    .hero-text {
        padding: 0 7%;
        text-align: center;
    }
    .steam-container {
        bottom: 10%;
        width: 220px;
        height: 300px;
    }
    .steam-wisp {
        width: 50px;
        height: 140px;
    }
}
</style>

<!-- Steam effect overlay -->
<div class="steam-container">
    <div class="steam-wisp"></div>
    <div class="steam-wisp"></div>
    <div class="steam-wisp"></div>
    <div class="steam-wisp"></div>
</div>

<div class="hero-text">
    <h1>
        Autumn Vibes<br>
        Authentic Chai
    </h1>

    <p>
        Experience the warmth of handcrafted chai,
        brewed with tradition, spices, and comfort
        in every sip — hot & steaming fresh.
    </p>

    <a href="#menu" class="hero-btn">Explore Flavors</a>
</div>



</section>
