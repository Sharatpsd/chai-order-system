{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chai Experience{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tweet/css/style.css' %}">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="{% static 'tweet/images/logo.png' %}">
            <h1>CHAI</h1>
        </div>
        <ul class="nav-links">
            <li><a href="{% url 'tweet:home' %}">Home</a></li>
            <li><a href="{% url 'tweet:home' %}#about">About</a></li>
            <li><a href="#menu">Flavors</a></li>
            <li><a href="#testimonials">Testimonials</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

{% block content %}{% endblock %}

<footer>
    <p>© 2025 Chai Experience. All rights reserved.</p>
</footer>

<script src="{% static 'tweet/js/script.js' %}"></script>
</body>
</html>
