{% load static %}

<section id="contact" class="contact-section">

<style>
/* ===== CONTACT – PREMIUM DARK MATCHING YOUR THEME ===== */
.contact-section {
    padding: 130px 5% 150px;
    background: linear-gradient(135deg, #241309 0%, #2b170a 60%, #3a1f0e 100%);
    color: #f5efe6;
    font-family: "Segoe UI", system-ui, sans-serif;
    scroll-margin-top: 120px; /* for fixed navbar */
}

.contact-container {
    max-width: 900px;
    margin: 0 auto;
    background: rgba(40,25,15,0.85);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 3.5rem 3rem;
    box-shadow: 0 25px 80px rgba(0,0,0,0.55);
    border: 1px solid rgba(242,184,75,0.15);
}

.contact-title {
    text-align: center;
    font-size: clamp(2.2rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 2.5rem;
    background: linear-gradient(90deg, #f2b84b, #ffdb7d);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.form-group {
    margin-bottom: 1.8rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.6rem;
    font-weight: 600;
    color: #f2b84b;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(242,184,75,0.2);
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: all 0.35s ease;
}

.form-group textarea {
    min-height: 140px;
    resize: vertical;
}

.form-group input::placeholder,
.form-group textarea::placeholder {
    color: #cbbca6;
}

.form-group input:focus,
.form-group textarea:focus {
    border-color: #f2b84b;
    box-shadow: 0 0 0 3px rgba(242,184,75,0.25);
    background: rgba(255,255,255,0.08);
}

.contact-btn {
    width: 100%;
    padding: 16px;
    margin-top: 1rem;
    background: linear-gradient(90deg, #f2b84b, #ffdb7d);
    color: #3a1f0e;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.4s ease;
}

.contact-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(242,184,75,0.45);
}

/* Success message */
.form-message {
    text-align: center;
    margin-top: 1.5rem;
    font-weight: 600;
}

/* Mobile */
@media (max-width: 600px) {
    .contact-container {
        padding: 2.5rem 1.8rem;
    }
}
</style>

<div class="contact-container">
    <h2 class="contact-title">Get in Touch</h2>

    <form id="contactForm" method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Your Message</label>
            <textarea name="message" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="contact-btn">Send Message</button>
    </form>

    <div id="formMessage" class="form-message"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("contactForm");
    const messageBox = document.getElementById("formMessage");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        fetch("{% url 'tweet:contact_submit' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                messageBox.innerHTML = "<span style='color:#4CAF50;'>Message sent successfully!</span>";
                form.reset();
            } else {
                messageBox.innerHTML = "<span style='color:#ff4d4d;'>Something went wrong.</span>";
            }
        })
        .catch(() => {
            messageBox.innerHTML = "<span style='color:#ff4d4d;'>Server error.</span>";
        });
    });

});
</script>

</section>
