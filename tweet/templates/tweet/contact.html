{% load static %}

<section id="contact" class="contact-section">

<style>
/* CONTACT – Premium Dark Warm Chai Style (consistent with About/Menu/Testimonials) */
.contact-section {
    padding: 130px 5% 150px;
    background: linear-gradient(135deg, #2b170a 0%, #3a1f0e 50%, #241309 100%);
    position: relative;
    overflow: hidden;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: #f5efe6;
}

.contact-section::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.12;
    z-index: 1;
}

/* Container */
.contact-container {
    position: relative;
    z-index: 2;
    max-width: 1080px;
    margin: 0 auto;
}

.contact-title {
    text-align: center;
    font-size: clamp(2.6rem, 5.5vw, 3.9rem);
    font-weight: 800;
    letter-spacing: -0.6px;
    background: linear-gradient(90deg, #f2b84b, #ffdb7d, #f2b84b);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 1.2rem;
    text-shadow: 0 4px 18px rgba(0,0,0,0.65);
}

.contact-subtitle {
    text-align: center;
    font-size: 1.15rem;
    color: #e8d9c2;
    margin-bottom: 3.5rem;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.65;
}

/* Form Card */
.contact-form-wrapper {
    background: rgba(40,25,15,0.78);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(242,184,75,0.16);
    border-radius: 22px;
    padding: 3rem 2.8rem;
    box-shadow: 0 16px 44px rgba(0,0,0,0.52);
    max-width: 780px;
    margin: 0 auto;
}

.form-group {
    margin-bottom: 1.9rem;
}

.form-group label {
    display: block;
    font-size: 1.06rem;
    font-weight: 600;
    color: #f2b84b;
    margin-bottom: 0.65rem;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 1.05rem 1.3rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(242,184,75,0.24);
    border-radius: 12px;
    color: #ffffff;
    font-size: 1.05rem;
    transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
}

.form-group input::placeholder,
.form-group textarea::placeholder {
    color: #c7b29a;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #f2b84b;
    box-shadow: 0 0 0 3px rgba(242,184,75,0.22);
    background: rgba(255,255,255,0.08);
}

.form-group textarea {
    min-height: 150px;
    resize: vertical;
}

/* Submit Button */
.btn-submit {
    width: 100%;
    padding: 1.15rem;
    background: linear-gradient(90deg, #f2b84b, #ffdb7d);
    color: #3a1f0e;
    font-size: 1.12rem;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.34,1.1,0.1,1.2);
    margin-top: 1.4rem;
}

.btn-submit:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 36px rgba(242,184,75,0.48);
}

.btn-submit:active {
    transform: translateY(0);
}

/* Responsive adjustments */
@media (max-width: 820px) {
    .contact-section { padding: 90px 6% 110px; }
    .contact-form-wrapper { padding: 2.4rem 2rem; }
}

@media (max-width: 480px) {
    .contact-title { font-size: clamp(2.1rem, 7vw, 2.8rem); }
    .contact-subtitle { font-size: 1.05rem; }
    .btn-submit { padding: 1rem; font-size: 1.05rem; }
}
</style>

<div class="contact-container">
    <h2 class="contact-title">Get in Touch</h2>
    <p class="contact-subtitle">Have questions about our chai, custom orders, or just want to say hello? We're here for you.</p>

    <div class="contact-form-wrapper">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="contact-name">Your Name</label>
                <input type="text" id="contact-name" name="name" placeholder="Enter your full name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="contact-email">Email Address</label>
                <input type="email" id="contact-email" name="email" placeholder="your.email@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="contact-message">Your Message</label>
                <textarea id="contact-message" name="message" placeholder="How can we help you today?..." required rows="6"></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </div>
</div>

</section>
